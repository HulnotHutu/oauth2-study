<!DOCTYPE html>
<html>
<head><title>OAuth2 Authorization Server</title></head>
<body>
	<h2>OAuth2 Authorization Server</h2>
	<p>Client <strong>{{.ClientID}}</strong> is requesting access to your protected resources.</p>
	<form method="post">
		<input type="hidden" name="client_id" value="{{.ClientID}}">
		<input type="hidden" name="redirect_uri" value="{{.RedirectURI}}">
		<input type="hidden" name="response_type" value="{{.ResponseType}}">
		<input type="hidden" name="state" value="{{.State}}">
		<div style="margin:10px 0">
			<label>Username: <input type="text" name="username" required></label>
		</div>
		<div style="margin:10px 0">
			<label>Password: <input type="password" name="password" required></label>
		</div>
		<div style="margin:10px 0">
			<label><input type="checkbox" name="approve" value="yes" checked> Approve</label>
		</div>
		<button type="submit">Login & Authorize</button>
	</form>
</body>
</html>
