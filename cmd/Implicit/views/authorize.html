<!DOCTYPE html>
<html>
<head><title>Authorize - Implicit Grant</title></head>
<body>
	<h2>Authorize Access</h2>
	<p>Client <strong>{{.ClientID}}</strong> is requesting access to your resources.</p>
	<form method="POST" action="/authorize">
		<input type="hidden" name="client_id" value="{{.ClientID}}">
		<input type="hidden" name="redirect_uri" value="{{.RedirectURI}}">
		<input type="hidden" name="response_type" value="{{.ResponseType}}">
		<input type="hidden" name="state" value="{{.State}}">
		<label>Username: <input type="text" name="username" required></label><br><br>
		<label>Password: <input type="password" name="password" required></label><br><br>
		<label><input type="checkbox" name="approve" value="yes" checked> Approve access</label><br><br>
		<button type="submit">Authorize</button>
	</form>
</body>
</html>
